services:
  server:
    image: docker.gitea.com/gitea:latest-rootless
    restart: always
    network_mode: bridge
    volumes:
      - ./gitea-data:/data
      - ./config:/config
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:2222"
