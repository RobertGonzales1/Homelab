services:
  tubearchivist:
    container_name: tubearchivist
    restart: always
    image: bbilly1/tubearchivist
    ports:
      - 8123:8000
    volumes:
      - youtube:/youtube
      - cache:/cache
    environment:
      - ES_URL=http://archivist-es:9200     # needs protocol e.g. http and port
      - REDIS_CON=redis://archivist-redis:6379
      - TA_HOST=http://10.30.1.4:8123  https://SubDomain.MainDomain.Com # set your host name with protocol and port # You Can Add Multiple Domains With a Space Between Each One.
      - TA_USERNAME=XXXXXXXXXX           # your initial TA credentials
      - TA_PASSWORD=XXXXXXXXXX              # your initial TA credentials
      - ELASTIC_PASSWORD=XXXXXXXXXX         # set password for Elasticsearch
      - TZ=America/Los_Angeles                 # set your time zone
    depends_on:
      - archivist-es
      - archivist-redis
  archivist-redis:
    image: redis
    container_name: archivist-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis:/data
    depends_on:
      - archivist-es
  archivist-es:
    image: bbilly1/tubearchivist-es         # only for amd64, or use official es 8.19.0
    container_name: archivist-es
    restart: always
    environment:
      - "ELASTIC_PASSWORD=XXXXXXXXXX"       # matching Elasticsearch password
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - "xpack.security.enabled=true"
      - "discovery.type=single-node"
      - "path.repo=/usr/share/elasticsearch/data/snapshot"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es:/usr/share/elasticsearch/data    # check for permission error when using bind mount, see readme
    expose:
      - "9200"

volumes:
  media:
  cache:
  redis:
  es:
  youtube:
    external: true
