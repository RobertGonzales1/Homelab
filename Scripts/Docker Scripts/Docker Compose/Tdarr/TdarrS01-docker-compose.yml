version: "3.4"
services:
 tdarr:
  container_name: tdarr
  image: ghcr.io/haveagitgat/tdarr:latest
  restart: always
  network_mode: bridge
  ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
  environment:
      - TZ=America/Los_Angeles
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK_SET=002
      - serverIP=10.30.1.2
      - serverPort=8266
      - webUIPort=8265
      - internalNode=false
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=TdarrS01
      - auth=false
      - openBrowser=true
      - maxLogSizeMB=10
      - cronPluginUpdate=
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
  volumes:
    - /docker/tdarr/server:/app/server
    - /docker/tdarr/configs:/app/configs
    - /docker/tdarr/logs:/app/logs
    - /media:/media
    - /transcode_cache:/temp
  
volumes:
 media:
      external: true
